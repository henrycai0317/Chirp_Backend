spring:
  application:
    name: chirp

  data:
    redis:
      host: "redis-15127.crce271.asia-east1-3.gcp.cloud.redislabs.com"
      password: ${REDIS_PASSWORD}
      username: "default"
      port: 15127
      connection-timeout: 5000ms
      timeout: 2000ms

  datasource:
    url: jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres
    username: postgres.jixkixvqagydeqnwobqa
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
        maximum-pool-size: 10
        minimum-idle: 5
        connection-timeout: 20000
        idle-timeout: 300000
        max-lifetime: 12000000
        pool-name: SpringBootHikariCP
        data-source-properties:
          prepareThreshold: 5
          preparedStatementCacheQueries: 256
          preparedStatementCacheSizeMiB: 5

          tcpKeepAlive: true
          socketTimeout: 30
          connectTimeout: 10

  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  mail:
    port: 587
    password: ${MAILGUN_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  rabbitmq:
    host: capybara.lmq.cloudamqp.com
    password: ${RABBITMQ_PASSWORD}
    username: ybsfsfpt
    ssl:
      enabled: true
    virtual-host: ybsfsfpt
    listener:
      simple:
        acknowledge-mode: auto
        concurrency: 1
        max-concurrency: 3
        prefetch: 10
        default-requeue-rejected: true
        retry:
          enabled: true
          initial-interval: 1000ms
          max-interval: 10000ms
          max-attempts: 3
          multiplier: 2

jwt:
  secret: ${JWT_SECRET_BASE64}

chirp:
  email:
    from: "Chirp <postmaster@sandbox5eade1209cf44bea8d5060ddf086c084.mailgun.org>"
    verification:
      expiry-hours: 24
    reset-password:
      expiry-minutes: 30

nginx:
  trusted-ips:
    - "127.0.0.1" # nginx on the same machine
    - "::1" # IPv6 localhost
    - "172.17.0.0/16" # nginx container IP when using Docker
    - "10.0.0.5/32" # nginx server IP (if separate machine)


